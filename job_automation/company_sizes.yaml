# Curated company -> employee-count overrides (a.k.a. the "too big" blacklist).
#
# Most job postings carry no parseable headcount, so the <200-employee filter
# can't bite. List companies here (by name; legal suffixes like GmbH/AG/Inc and
# accents are ignored when matching) to give the filter ground truth. A value
# can be a bare number (e.g. 90000) or a range/label (e.g. "11-50", "1,001+").
# Anything whose lower bound exceeds MAX_COMPANY_EMPLOYEES (200) is dropped.
#
# Targeting goal stays "under 200 employees", with a bit of tolerance up to ~300
# for borderline companies whose size we don't know (those are kept for manual
# review). Companies listed below are known to be far larger than that, so they
# are always dropped from the export.
#
# Add your own as you discover them. Obvious large companies are seeded so they
# never slip back into the export:

